name: scheduled Pipeline

on:
  schedule:
    - cron: "0 9 * * *"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Running tests"

  lint:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Linting code"

  report:
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - run: echo "Generating report"